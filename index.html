<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abrox – Profit Hunters Chat</title>

  <!-- Widget CSS -->
  <link rel="stylesheet" href="widget.css" />

  <script>
    // Site configuration
    window.CONTACT_ADMIN_LINK = "https://t.me/ph_suppp";
    window.MEMBER_COUNT = 1284;
    window.ONLINE_COUNT = 128;

    window.REALISM_CONFIG = {
      TOTAL_PERSONAS: 1200,
      INITIAL_POOL: 400,
      POOL_MIN: 300,
      POOL_MAX: 3000,
      DEDUP_LIMIT: 200000,
      MIN_INTERVAL_MS: 20000,
      MAX_INTERVAL_MS: 60000,
      REACTION_TICK_MS: 30000,
      TREND_SPIKE_PROB: 0.02
    };

    window.JOINER_CONFIG = {
      minIntervalMs: 1000 * 60 * 60 * 6,
      maxIntervalMs: 1000 * 60 * 60 * 24,
      initialJoins: 3,
      welcomeMessage: "Welcome! Please use Contact Admin to verify."
    };
  </script>
</head>
<body>
  <div id="tg-comments-app">

    <!-- HEADER -->
    <header class="tg-header" role="banner">
      <button id="tg-back" class="tg-back-btn" aria-label="Back">
        <i data-lucide="arrow-left"></i>
      </button>

      <div class="tg-header-center">
        <img src="assets/logo.jpg" alt="Logo" class="tg-header-avatar" />
        <div class="tg-header-info">
          <div class="tg-title">🌐 Profit Hunters Chat</div>
          <div class="tg-meta" id="tg-meta-line">1,284 members, 128 online</div>
        </div>
      </div>

      <button id="tg-options" class="tg-options-btn" aria-label="Options">
        <i data-lucide="more-vertical"></i>
      </button>
    </header>

    <!-- CHAT CONTAINER with PIN BANNER inside -->
    <main id="tg-comments-container" class="tg-comments-container" role="feed" aria-live="off">
      <div id="tg-pin-banner" class="tg-pin-banner" role="region" aria-live="polite"></div>
    </main>

    <!-- NEW MESSAGE JUMP INDICATOR -->
    <div id="tg-jump-indicator" class="hidden" aria-hidden="true">
      <i data-lucide="chevron-down"></i>
      <span id="tg-jump-text">New messages</span>
    </div>

    <!-- NEW DYNAMIC INPUT BAR (no lock) -->
    <div class="tg-input-wrapper" role="form" aria-label="Send a message">
      <div class="tg-input-bar glass" id="tg-input-bar">
        <button id="emoji-btn" class="input-icon-btn" aria-label="Emoji">
          <i data-lucide="smile" class="w-5 h-5"></i>
        </button>
        <input type="text" id="tg-message-input" class="tg-comment-input" placeholder="Type a message..." autocomplete="off">
        <button id="dynamic-send-btn" class="input-icon-btn dynamic-btn" aria-label="Send or voice">
          <i data-lucide="mic" class="w-5 h-5"></i>
        </button>
      </div>
    </div>

  </div>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Scripts (original loading order) -->
  <script src="identity-personas.js"></script>
  <script src="bubble-renderer-fixed-v2.js"></script>
  <script src="ultimate-realism-full-v7.13.js"></script>
  <script src="interactions-v14.1-crowd-join-replies-typing-auto-hide.js"></script>
  <script src="app-fixed.js"></script>

  <!-- Initialization + dynamic input logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize icons
      if(window.lucide?.createIcons){ window.lucide.createIcons(); }

      // Ensure TGRenderer exists
      if(!window.TGRenderer){
        console.error("TGRenderer not loaded yet.");
        return;
      }

      // ========== NEW DYNAMIC INPUT BAR LOGIC ==========
      const messageInput = document.getElementById('tg-message-input');
      const dynamicBtn = document.getElementById('dynamic-send-btn');
      let currentIcon = 'mic'; // 'mic' or 'send'

      function updateDynamicButton() {
        const hasText = messageInput.value.trim().length > 0;
        if (hasText && currentIcon !== 'send') {
          dynamicBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i>';
          lucide.createIcons();
          currentIcon = 'send';
          dynamicBtn.setAttribute('aria-label', 'Send message');
        } else if (!hasText && currentIcon !== 'mic') {
          dynamicBtn.innerHTML = '<i data-lucide="mic" class="w-5 h-5"></i>';
          lucide.createIcons();
          currentIcon = 'mic';
          dynamicBtn.setAttribute('aria-label', 'Voice message');
        }
      }

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        const currentUser = {
          name: "You",
          avatar: null,
          isAdmin: false
        };
        
        if (window.TGRenderer?.appendMessage) {
          window.TGRenderer.appendMessage(currentUser, text, { type: 'outgoing', timestamp: new Date() });
          messageInput.value = '';
          updateDynamicButton();
          const container = document.getElementById('tg-comments-container');
          if (container) container.scrollTop = container.scrollHeight;
        } else {
          console.warn("TGRenderer not ready");
        }
      }

      messageInput.addEventListener('input', updateDynamicButton);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });

      dynamicBtn.addEventListener('click', () => {
        if (currentIcon === 'send') {
          sendMessage();
        } else {
          alert("Voice messages coming soon");
        }
      });

      const emojiBtn = document.getElementById('emoji-btn');
      if (emojiBtn) {
        emojiBtn.addEventListener('click', () => {
          alert("Emoji picker coming soon");
        });
      }

      // Optional: listen to header typing
      document.addEventListener('headerTyping', (e) => {
        console.log(e.detail.name + " is typing…");
      });

      document.addEventListener('headerTypingStop', (e) => {
        console.log(e.detail.name + " stopped typing");
      });
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abrox – Profit Hunters Chat</title>

  <!-- Widget CSS -->
  <link rel="stylesheet" href="widget.css" />

  <script>
    // Site configuration
    window.CONTACT_ADMIN_LINK = "https://t.me/ph_suppp";
    window.MEMBER_COUNT = 1284;
    window.ONLINE_COUNT = 128;

    window.REALISM_CONFIG = {
      TOTAL_PERSONAS: 1200,
      INITIAL_POOL: 400,
      POOL_MIN: 300,
      POOL_MAX: 3000,
      DEDUP_LIMIT: 200000,
      MIN_INTERVAL_MS: 20000,
      MAX_INTERVAL_MS: 60000,
      REACTION_TICK_MS: 30000,
      TREND_SPIKE_PROB: 0.02
    };

    window.JOINER_CONFIG = {
      minIntervalMs: 1000 * 60 * 60 * 6,
      maxIntervalMs: 1000 * 60 * 60 * 24,
      initialJoins: 3,
      welcomeMessage: "Welcome! Please use Contact Admin to verify."
    };
  </script>
</head>
<body>
  <div id="tg-comments-app">

    <!-- HEADER -->
    <header class="tg-header" role="banner">
      <button id="tg-back" class="tg-back-btn" aria-label="Back">
        <i data-lucide="arrow-left"></i>
      </button>

      <div class="tg-header-center">
        <img src="assets/logo.jpg" alt="Logo" class="tg-header-avatar" />
        <div class="tg-header-info">
          <div class="tg-title">🌐 Profit Hunters Chat</div>
          <div class="tg-meta" id="tg-meta-line">1,284 members, 128 online</div>
        </div>
      </div>

      <button id="tg-options" class="tg-options-btn" aria-label="Options">
        <i data-lucide="more-vertical"></i>
      </button>
    </header>

    <!-- CHAT CONTAINER -->
    <main id="tg-comments-container" class="tg-comments-container" role="feed" aria-live="off">
      <div id="tg-pin-banner" class="tg-pin-banner" role="region" aria-live="polite"></div>
    </main>

    <!-- JUMP INDICATOR -->
    <div id="tg-jump-indicator" class="hidden" aria-hidden="true">
      <i data-lucide="chevron-down"></i>
      <span id="tg-jump-text">New messages</span>
    </div>

    <!-- DYNAMIC GLASS INPUT BAR (with white mic/send icons) -->
    <div class="tg-input-wrapper" role="form" aria-label="Send a message">
      <div class="tg-input-bar glass" id="tg-input-bar">
        <button id="emoji-btn" class="input-icon-btn" aria-label="Emoji">
          <i data-lucide="smile" class="w-5 h-5"></i>
        </button>
        <input type="text" id="tg-message-input" class="tg-comment-input" placeholder="Type a message..." autocomplete="off">
        <button id="attachment-btn" class="input-icon-btn" aria-label="Attach media">
          <i data-lucide="paperclip" class="w-5 h-5"></i>
        </button>
        <button id="dynamic-send-btn" class="input-icon-btn dynamic-btn" aria-label="Send or voice">
          <!-- Initially mic icon (raw SVG with white stroke) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Scripts (original loading order) -->
  <script src="identity-personas.js"></script>
  <script src="bubble-renderer-fixed-v2.js"></script>
  <script src="ultimate-realism-full-v7.13.js"></script>
  <script src="interactions-v14.1-crowd-join-replies-typing-auto-hide.js"></script>
  <script src="app-fixed.js"></script>

  <!-- Dynamic input logic (with raw SVG icons for white color) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if(window.lucide?.createIcons) window.lucide.createIcons();
      if(!window.TGRenderer) {
        console.error("TGRenderer not loaded yet.");
        return;
      }

      const messageInput = document.getElementById('tg-message-input');
      const dynamicBtn = document.getElementById('dynamic-send-btn');
      const emojiBtn = document.getElementById('emoji-btn');
      const attachmentBtn = document.getElementById('attachment-btn');
      let currentIcon = 'mic';

      // SVG strings with white stroke
      const micSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>';
      const sendSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';

      function updateDynamicButton() {
        const hasText = messageInput.value.trim().length > 0;
        if (hasText && currentIcon !== 'send') {
          dynamicBtn.innerHTML = sendSVG;
          currentIcon = 'send';
          dynamicBtn.setAttribute('aria-label', 'Send message');
        } else if (!hasText && currentIcon !== 'mic') {
          dynamicBtn.innerHTML = micSVG;
          currentIcon = 'mic';
          dynamicBtn.setAttribute('aria-label', 'Voice message');
        }
      }

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        const currentUser = { name: "You", avatar: null, isAdmin: false };
        if (window.TGRenderer?.appendMessage) {
          window.TGRenderer.appendMessage(currentUser, text, { type: 'outgoing', timestamp: new Date() });
          messageInput.value = '';
          updateDynamicButton();
          const container = document.getElementById('tg-comments-container');
          if (container) container.scrollTop = container.scrollHeight;
        } else {
          console.warn("TGRenderer not ready");
        }
      }

      messageInput.addEventListener('input', updateDynamicButton);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });

      dynamicBtn.addEventListener('click', () => {
        if (currentIcon === 'send') {
          sendMessage();
        } else {
          alert("Voice messages coming soon");
        }
      });

      if (emojiBtn) emojiBtn.addEventListener('click', () => alert("Emoji picker coming soon"));
      if (attachmentBtn) attachmentBtn.addEventListener('click', () => alert("Media picker coming soon"));

      // Header typing listeners (optional)
      document.addEventListener('headerTyping', (e) => console.log(e.detail.name + " is typing…"));
      document.addEventListener('headerTypingStop', (e) => console.log(e.detail.name + " stopped typing"));
    });
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <rect width="240" height="240" fill="#0e1621"/>

  <!-- Telegram-style faint doodles -->
  <g fill="none" stroke="#1f2c3a" stroke-width="1.2" opacity="0.18">
    
    <!-- circles -->
    <circle cx="20" cy="30" r="10"/>
    <circle cx="60" cy="50" r="14"/>
    <circle cx="180" cy="60" r="12"/>
    <circle cx="120" cy="180" r="16"/>
    
    <!-- triangles -->
    <path d="M80 30 L100 60 L60 60 Z"/>
    <path d="M160 160 L180 190 L140 190 Z"/>
    
    <!-- lines -->
    <path d="M20 120 L60 140"/>
    <path d="M200 140 L220 180"/>
    
    <!-- zigzag -->
    <path d="M20 200 L40 210 L60 200 L80 210"/>

    <!-- chat bubble -->
    <path d="M140 40 h40 a10 10 0 0 1 10 10 v20 a10 10 0 0 1-10 10 h-20 l-10 10 v-10 h-10 a10 10 0 0 1-10-10 v-20 a10 10 0 0 1 10-10 z"/>

  </g>
</svg>
